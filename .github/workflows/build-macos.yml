name: Build macOS .app

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Release uploads need write access to repo contents.
permissions:
  contents: write

jobs:
  build:
    name: Build Glass.app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Pin the toolchain explicitly to match `rust-toolchain.toml`.
      # Drift between CI's `@stable` and the local pin surfaces as
      # a `recursion limit reached` error in the `dispatch2` crate
      # (a transitive macOS dep via gpui_macos). Bump both files
      # together when moving forward.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release -p glass-cli

      - name: Assemble .app bundle
        run: ./packaging/make-app.sh

      # Tagged builds get a versioned filename so the release-attached
      # zip self-identifies. Branch / PR builds stay keyed by the
      # commit sha.
      - name: Decide zip name
        id: zip
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            name="Glass-${tag}-macOS.zip"
          else
            name="Glass-app-${GITHUB_SHA}.zip"
          fi
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Zip Glass.app
        run: |
          cd dist
          zip -r "${{ steps.zip.outputs.name }}" Glass.app

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glass.app-${{ github.sha }}
          path: dist/${{ steps.zip.outputs.name }}
          if-no-files-found: error
          retention-days: 14

      # On a v* tag push: create (or update) a GitHub Release and
      # attach the versioned zip. Skipped for branch / PR / manual
      # runs — those only produce a workflow artifact.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.zip.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
