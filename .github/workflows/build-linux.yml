name: Build Linux binary

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Release uploads need write access to repo contents.
permissions:
  contents: write

jobs:
  build:
    name: Build glass (linux-amd64)
    # Build on the oldest supported runner so the binary links
    # against an older glibc and runs on a wider range of distros.
    # A binary built here works on any system with glibc >= the
    # one shipped in Ubuntu 22.04; building on a newer runner would
    # raise that floor and break on older targets.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # gpui's native dependencies + the system GLib that the
      # Frida driver links against on Linux (see README "Building"
      # and crates/glass-frida/build.rs). These ship with macOS but
      # must be installed here. Keep in sync with the README list.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake pkg-config \
            libfontconfig-dev libfreetype-dev \
            libwayland-dev libxkbcommon-x11-dev \
            libasound2-dev libvulkan-dev \
            libzstd-dev libsqlite3-dev libssl-dev \
            libglib2.0-dev

      # Pin the toolchain explicitly to match `rust-toolchain.toml`
      # and the macOS workflow. Bump all three together when moving
      # forward.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release -p glass-cli

      # Strip debug info — the unstripped binary is ~900MB; stripping
      # brings it down to something reasonable to attach to a release.
      - name: Stage stripped binary
        id: bin
        run: |
          mkdir -p dist
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            name="glass-${tag}-linux-amd64"
          else
            name="glass-linux-amd64-${GITHUB_SHA}"
          fi
          cp target/release/glass "dist/${name}"
          strip "dist/${name}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: glass-linux-amd64-${{ github.sha }}
          path: dist/${{ steps.bin.outputs.name }}
          if-no-files-found: error
          retention-days: 14

      # On a v* tag push: attach the naked binary to the GitHub
      # Release. softprops/action-gh-release creates the release if
      # it doesn't already exist, or adds files to it if the macOS
      # job got there first. Skipped for branch / PR / manual runs.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.bin.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
