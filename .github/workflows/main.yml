name: Build Glass for Android ARMv7 (force trash 3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Cargo.toml and remove git trash
        run: |
          # Remove Cargo.lock to prevent dependency locking
          rm -f Cargo.lock
          
          # Remove all trash git dependencies from workspace root
          sed -i '/trash.*git/d' Cargo.toml
          sed -i '/trash = { git/d' Cargo.toml
          
          # Add stable trash version if not present
          if ! grep -q "^trash =" Cargo.toml; then
            echo 'trash = "3.5.0"' >> Cargo.toml
          fi
          
          # Also fix any crate-level Cargo.toml files that may have trash dependencies
          find crates -name "Cargo.toml" -exec sed -i '/trash.*git/d' {} \;
          find crates -name "Cargo.toml" -exec sed -i '/trash = { git/d' {} \;
          
          # Display for debugging
          echo "=== Root Cargo.toml ===" 
          cat Cargo.toml
          echo "=== Crate dependencies ===" 
          find crates -name "Cargo.toml" -exec echo "File: {}" \; -exec grep -A2 "trash" {} \;

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Install cross and cargo-edit (optional)
        run: |
          cargo install cross
          cargo install cargo-edit

      - name: Update dependencies
        run: cargo update

      - name: Build with cross
        run: cross build --target armv7-linux-androideabi --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: glass-armv7-fixed
          path: target/armv7-linux-androideabi/release/glass
