name: Build Glass for Android (fixed trash)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove git trash and add versioned trash
        run: |
          # حذف هر خطی که شامل 'trash' و 'git' است
          sed -i '/trash.*git/d' Cargo.toml
          # اضافه کردن وابستگی نسخه‌دار در انتهای فایل
          echo -e "\ntrash = \"3\"" >> Cargo.toml
          # نمایش فایل برای اطمینان
          cat Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --target armv7-linux-androideabi --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: glass-armv7-fixed
          path: target/armv7-linux-androideabi/release/glass
