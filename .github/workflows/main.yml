name: Build Glass for Android ARMv7 (cross)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --target armv7-linux-androideabi --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: glass-armv7
          path: target/armv7-linux-androideabi/release/glass
