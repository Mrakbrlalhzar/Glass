name: Build Glass for Android ARMv7 (force trash 3)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Cargo.toml and remove git trash
        run: |
          # حذف Cargo.lock برای جلوگیری از لاک شدن وابستگی
          rm -f Cargo.lock
          
          # حذف کامل هر خطی که trash با git دارد (حتی اگر چند خط باشد)
          sed -i '/trash.*git/d' Cargo.toml
          
          # حذف هر خطی که trash = { git = ... } باشد
          sed -i '/trash = { git/d' Cargo.toml
          
          # اضافه کردن نسخه crates.io (نسخه 3.5.0 که پایدار است)
          if ! grep -q "^trash =" Cargo.toml; then
            echo 'trash = "3.5.0"' >> Cargo.toml
          fi
          
          # نمایش فایل برای اشکال‌زدایی
          cat Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Install cross and cargo-edit (optional)
        run: |
          cargo install cross
          cargo install cargo-edit

      - name: Update dependencies
        run: cargo update

      - name: Build with cross
        run: cross build --target armv7-linux-androideabi --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: glass-armv7-fixed
          path: target/armv7-linux-androideabi/release/glass
