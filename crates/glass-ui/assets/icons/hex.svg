<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round">
  <!-- Box framing the bytes -->
  <rect x="1.5" y="3.5" width="13" height="9" rx="1.2" />
  <!-- "0x" inside, drawn as paths so it stays mono-coloured
       through currentColor instead of needing a text node. -->
  <!-- Zero -->
  <ellipse cx="5" cy="8" rx="1.6" ry="2.4" />
  <!-- x -->
  <path d="M8.5 6 L 12 10 M 12 6 L 8.5 10" stroke-linecap="round" />
</svg>
