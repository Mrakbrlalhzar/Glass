<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Four narrow rows with a dotted "address column" on the
       left and varying-width "instruction" bars on the right.
       Reads as "disassembled rows of instructions". -->
